    <main>
        <section class="contacto-section">
            <h2>¿Te he convencido?</h2>
            <p class="intro-text">Entonces, no dudes en ponerte en contacto conmigo.</p>
            <form method="POST" action="contacto.php">
                <div class="form-group">
                    <label for="name">Nombre completo <span class="requerido">*</span></label>
                    <input id="name" type="text" name="name" placeholder="Ej: Juan García" required>
                </div>
                    
                <div class="form-group">
                    <label for="email">Correo electrónico <span class="requerido">*</span></label>
                    <input id="email" type="email" name="email" placeholder="Ej: ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="asunto">Asunto <span class="requerido">*</span></label>
                    <input id="asunto" type="text" name="asunto" placeholder="Ej: Consulta sobre servicios" required>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje <span class="requerido">*</span></label>
                    <textarea id="message" name="message" placeholder="Escribe tu mensaje aquí..." rows="6" required></textarea>
                </div>

                <button type="submit">Enviar mensaje</button>
            </form>
        </section>
    </main>
